<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MedTrack"/>
<title>MedTrack</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #14141f;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #4a4a6a;
    --accent: #f5a623;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Plus Jakarta Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overscroll-behavior: none; }
  body { padding-bottom: env(safe-area-inset-bottom); }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
  .header { padding: 52px 24px 20px; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 0 24px 24px; }
  .nav { display: flex; border-top: 1px solid var(--border); padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); flex-shrink: 0; background: var(--bg); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 10px; cursor: pointer; padding: 4px; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  /* Header */
  .date-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .page-title { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .progress-bar { margin-top: 16px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* Time slots */
  .slot { margin-bottom: 28px; }
  .slot-time { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .slot-time::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .slot-time.upcoming { color: var(--accent); }
  .slot-time.past { color: var(--border); }

  /* Med cards */
  .med-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .med-card:active { transform: scale(0.98); }
  .med-card.done { opacity: 0.45; }
  .med-card.done .med-name { text-decoration: line-through; }
  .check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; transition: all 0.2s; background: transparent; }
  .med-card.done .check { background: var(--green); border-color: var(--green); }
  .med-card.upcoming .check { border-color: var(--accent); }
  .med-info { flex: 1; min-width: 0; }
  .med-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .med-detail { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
  .med-badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
  .badge-weekly { background: #1a1a3a; color: var(--blue); }
  .badge-done { background: #0a1a0a; color: var(--green); }

  /* All done state */
  .all-done { text-align: center; padding: 48px 24px; }
  .all-done-icon { font-size: 48px; margin-bottom: 16px; }
  .all-done-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .all-done-sub { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* Settings page */
  .settings-section { margin-bottom: 28px; }
  .settings-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .settings-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .settings-row-label { font-size: 14px; font-weight: 500; }
  .settings-row-val { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .toggle { width: 44px; height: 26px; background: var(--border); border-radius: 13px; position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0; }
  .toggle.on { background: var(--green); }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(18px); }
  .action-btn { width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; text-align: left; padding-left: 16px; transition: background 0.15s; }
  .action-btn:active { background: var(--surface); }
  .action-btn.danger { color: var(--red); border-color: #3a1a1a; }

  /* Toast */
  .toast { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .slot { animation: fadeUp 0.3s ease both; }
  .slot:nth-child(1){animation-delay:0.05s}
  .slot:nth-child(2){animation-delay:0.1s}
  .slot:nth-child(3){animation-delay:0.15s}
  .slot:nth-child(4){animation-delay:0.2s}
  .slot:nth-child(5){animation-delay:0.25s}

  /* History page */
  .history-day { margin-bottom: 24px; }
  .history-day-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; }
  .history-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
  .history-name { font-size: 13px; font-weight: 500; }
  .history-status { font-family: var(--mono); font-size: 11px; }
  .status-taken { color: var(--green); }
  .status-missed { color: var(--red); }

  /* Scan page */
  .upload-area { border: 1.5px dashed var(--border); border-radius: 14px; padding: 32px 20px; text-align: center; margin-bottom: 16px; position: relative; background: var(--surface); }
  .upload-area input[type=file] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-text { font-size: 14px; color: var(--muted); }
  .upload-preview { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 12px; object-fit: contain; }
  .primary-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s; }
  .primary-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .secondary-btn { width: 100%; padding: 13px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }

  /* Confirm screen */
  .confirm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .confirm-card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .confirm-field { margin-bottom: 10px; }
  .confirm-field label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .confirm-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; }
  .confirm-field input:focus { border-color: var(--accent); }
  .times-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .time-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .remove-btn { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; padding: 0 4px; }
  .scanning-state { text-align: center; padding: 40px 20px; }
  .scanning-spinner { font-size: 36px; margin-bottom: 16px; animation: spin 1.5s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* API key input */
  .api-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; }
  .api-input:focus { border-color: var(--accent); }
  .notif-banner { background: #1a1400; border: 1px solid #3a3000; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
  .notif-banner-text { flex: 1; font-size: 13px; color: #c8a84a; line-height: 1.5; }
  .notif-enable-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 8px 14px; font-family: var(--sans); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>
<div class="app">
  <div class="header" id="header"></div>
  <div class="content" id="content"></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('today')" id="nav-today">
      <span class="nav-icon">💊</span>Today
    </button>
    <button class="nav-btn" onclick="showPage('history')" id="nav-history">
      <span class="nav-icon">📋</span>History
    </button>
    <button class="nav-btn" onclick="showPage('scan')" id="nav-scan">
      <span class="nav-icon">📷</span>Scan
    </button>
    <button class="nav-btn" onclick="showPage('settings')" id="nav-settings">
      <span class="nav-icon">⚙️</span>Settings
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const DEFAULT_MEDS = [
  { id: "m1", name: "Thiotrik MR 8mg", dosage: "8mg", composition: "Etoricoxib + Thiocolchiside", times: ["08:00", "21:00"], duration: "14 days", instructions: "After food", weekly: false },
  { id: "m2", name: "Toxnuron-M SR", dosage: "1500mcg + 75mg", composition: "Methylcobalamin + Pregabalin", times: ["13:00", "22:00"], duration: "14 days", instructions: "After food", weekly: false },
  { id: "m3", name: "Etogan 90", dosage: "90mg", composition: "Etoricoxib", times: ["18:00"], duration: "14 days", instructions: "After evening snack", weekly: false },
  { id: "m4", name: "Norkal Forte MD3", dosage: "", composition: "Magnesium", times: ["22:00"], duration: "30 days", instructions: "At bedtime", weekly: false },
  { id: "m5", name: "Vit D 60000 IU", dosage: "60000 IU", composition: "Vitamin D", times: ["08:00"], duration: "12 weeks", instructions: "Once a week, Sunday morning", weekly: true }
];

function loadMeds() {
  const saved = localStorage.getItem("medtrack_meds");
  return saved ? JSON.parse(saved) : DEFAULT_MEDS;
}

function saveMeds(meds) {
  localStorage.setItem("medtrack_meds", JSON.stringify(meds));
}

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

function loadLog() {
  const saved = localStorage.getItem("medtrack_log");
  return saved ? JSON.parse(saved) : {};
}

function saveLog(log) {
  localStorage.setItem("medtrack_log", JSON.stringify(log));
}

function isDoseLogged(medId, time) {
  const log = loadLog();
  const key = getTodayKey();
  return !!(log[key] && log[key][medId + "_" + time]);
}

function toggleDose(medId, time) {
  const log = loadLog();
  const key = getTodayKey();
  if (!log[key]) log[key] = {};
  const doseKey = medId + "_" + time;
  if (log[key][doseKey]) {
    delete log[key][doseKey];
    showToast("Marked as not taken");
  } else {
    log[key][doseKey] = new Date().toISOString();
    showToast("✓ Dose logged");
  }
  saveLog(log);
  renderPage();
}

function getNow() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function timeToMins(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function getSlotStatus(time) {
  const now = getNow();
  const t = timeToMins(time);
  if (t > now + 30) return "upcoming";
  if (t < now - 60) return "past";
  return "now";
}

function isToday(med) {
  if (!med.weekly) return true;
  return new Date().getDay() === 0; // Sunday
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────

let notifEnabled = localStorage.getItem("medtrack_notif") === "true";
let scheduledTimers = [];

function clearTimers() {
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
}

function scheduleNotifications() {
  clearTimers();
  if (!notifEnabled || Notification.permission !== "granted") return;
  const meds = loadMeds();
  const now = new Date();
  const nowMins = getNow();

  meds.forEach(med => {
    if (!isToday(med)) return;
    med.times.forEach(time => {
      const t = timeToMins(time);
      if (isDoseLogged(med.id, time)) return;
      const diffMs = (t - nowMins) * 60 * 1000;
      if (diffMs > 0) {
        const timer = setTimeout(() => {
          if (!isDoseLogged(med.id, time)) {
            new Notification("MedTrack", {
              body: `Time for ${med.name} ${med.dosage}. ${med.instructions}`,
              tag: med.id + "_" + time,
              requireInteraction: true
            });
          }
        }, diffMs);
        scheduledTimers.push(timer);
      }
    });
  });
}

async function requestNotifications() {
  if (!("Notification" in window)) {
    showToast("Notifications not supported on this browser");
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === "granted") {
    notifEnabled = true;
    localStorage.setItem("medtrack_notif", "true");
    scheduleNotifications();
    showToast("Notifications enabled");
    renderPage();
  } else {
    showToast("Permission denied");
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

// ── PAGES ─────────────────────────────────────────────────────────────────────

let currentPage = "today";

function showPage(page) {
  currentPage = page;
  ["today","history","scan","settings"].forEach(p => {
    const el = document.getElementById("nav-" + p);
    if (el) el.classList.toggle("active", p === page);
  });
  renderPage();
}

function renderPage() {
  if (currentPage === "today") renderToday();
  else if (currentPage === "history") renderHistory();
  else if (currentPage === "scan") renderScan();
  else renderSettings();
}

// ── TODAY PAGE ────────────────────────────────────────────────────────────────

function renderToday() {
  const meds = loadMeds();
  const now = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // Count total and done doses for today
  let total = 0, done = 0;
  meds.forEach(med => {
    if (!isToday(med)) return;
    med.times.forEach(time => {
      total++;
      if (isDoseLogged(med.id, time)) done++;
    });
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // Header
  document.getElementById("header").innerHTML = `
    <div class="date-label">${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}</div>
    <div class="page-title">${done === total && total > 0 ? "All done 🎉" : "Today's Doses"}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${done}/${total} doses taken</div>
  `;

  // Group by time slot
  const slots = {};
  meds.forEach(med => {
    if (!isToday(med)) return;
    med.times.forEach(time => {
      if (!slots[time]) slots[time] = [];
      slots[time].push(med);
    });
  });

  const sortedTimes = Object.keys(slots).sort();

  // Notification banner
  const showBanner = !notifEnabled || Notification.permission !== "granted";

  let html = "";

  if (showBanner) {
    html += `<div class="notif-banner">
      <div class="notif-banner-text">Enable notifications to get reminders at each dose time.</div>
      <button class="notif-enable-btn" onclick="requestNotifications()">Enable</button>
    </div>`;
  }

  if (total === 0) {
    html += `<div class="all-done"><div class="all-done-icon">🌿</div><div class="all-done-title">No meds today</div><div class="all-done-sub">Nothing scheduled. Enjoy your day.</div></div>`;
  } else if (done === total) {
    html += `<div class="all-done"><div class="all-done-icon">✅</div><div class="all-done-title">All done!</div><div class="all-done-sub">Every dose logged for today.<br>See you tomorrow.</div></div>`;
  }

  sortedTimes.forEach(time => {
    const status = getSlotStatus(time);
    const allDone = slots[time].every(m => isDoseLogged(m.id, time));
    html += `<div class="slot">
      <div class="slot-time ${status}">${time}${status === "now" ? " · NOW" : ""}</div>`;
    slots[time].forEach(med => {
      const logged = isDoseLogged(med.id, time);
      html += `<div class="med-card ${logged ? "done" : status === "upcoming" ? "upcoming" : ""}" onclick="toggleDose('${med.id}','${time}')">
        <div class="check">${logged ? "✓" : ""}</div>
        <div class="med-info">
          <div class="med-name">${med.name}</div>
          <div class="med-detail">${med.dosage ? med.dosage + " · " : ""}${med.instructions}</div>
        </div>
        ${med.weekly ? '<span class="med-badge badge-weekly">WEEKLY</span>' : ""}
        ${logged ? '<span class="med-badge badge-done">TAKEN</span>' : ""}
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById("content").innerHTML = html;
}

// ── HISTORY PAGE ──────────────────────────────────────────────────────────────

function renderHistory() {
  const meds = loadMeds();
  const log = loadLog();
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  document.getElementById("header").innerHTML = `
    <div class="date-label">Medication</div>
    <div class="page-title">History</div>
  `;

  const dates = Object.keys(log).sort().reverse().slice(0, 14);

  if (dates.length === 0) {
    document.getElementById("content").innerHTML = `<div style="color:var(--muted);font-size:14px;margin-top:32px;text-align:center">No history yet.<br>Start logging doses today.</div>`;
    return;
  }

  let html = "";
  dates.forEach(dateKey => {
    const d = new Date(dateKey);
    const label = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
    html += `<div class="history-day"><div class="history-day-label">${label}</div>`;
    meds.forEach(med => {
      med.times.forEach(time => {
        const taken = !!(log[dateKey] && log[dateKey][med.id + "_" + time]);
        html += `<div class="history-row">
          <div>
            <div class="history-name">${med.name}</div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${time}</div>
          </div>
          <span class="history-status ${taken ? "status-taken" : "status-missed"}">${taken ? "TAKEN" : "MISSED"}</span>
        </div>`;
      });
    });
    html += `</div>`;
  });

  document.getElementById("content").innerHTML = html;
}

// ── SCAN PAGE ─────────────────────────────────────────────────────────────────

let scanState = "idle"; // idle | scanning | confirm
let scanImageBase64 = null;
let scanImageMime = "image/jpeg";
let scanPreviewUrl = null;
let scannedMeds = [];

function renderScan() {
  document.getElementById("header").innerHTML = `
    <div class="date-label">Module 2</div>
    <div class="page-title">Scan Prescription</div>
  `;

  if (scanState === "scanning") {
    document.getElementById("content").innerHTML = `
      <div class="scanning-state">
        <div class="scanning-spinner">🔍</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">Reading prescription...</div>
        <div style="font-size:13px;color:var(--muted)">AI is extracting medications</div>
      </div>`;
    return;
  }

  if (scanState === "confirm") {
    renderConfirm();
    return;
  }

  const apiKey = localStorage.getItem("medtrack_gemini") || "AIzaSyB8YSZo9ikOp8U4i6bncjE8rbEUpcDGf-Q";

  let html = "";

  if (!apiKey) {
    html += `<div class="notif-banner" style="margin-bottom:20px">
      <div class="notif-banner-text">Add your free Gemini API key in Settings to enable scanning.</div>
      <button class="notif-enable-btn" onclick="showPage('settings')">Settings</button>
    </div>`;
  }

  html += `
    <div class="upload-area">
      <div class="upload-icon">📋</div>
      <div class="upload-text">Tap to take photo or choose from gallery</div>
      <input type="file" accept="image/*" onchange="handleScanFile(event)" />
      ${scanPreviewUrl ? `<img src="${scanPreviewUrl}" class="upload-preview" />` : ""}
    </div>
    <button class="primary-btn" ${!scanImageBase64 || !apiKey ? "disabled" : ""} onclick="runScan()">
      Scan Prescription
    </button>
    ${scanImageBase64 ? `<button class="secondary-btn" onclick="clearScan()">Clear</button>` : ""}
  `;

  document.getElementById("content").innerHTML = html;
}

function handleScanFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  scanImageMime = file.type || "image/jpeg";
  const reader = new FileReader();
  reader.onload = (ev) => {
    scanPreviewUrl = ev.target.result;
    scanImageBase64 = ev.target.result.split(",")[1];
    renderScan();
  };
  reader.readAsDataURL(file);
}

function clearScan() {
  scanImageBase64 = null;
  scanPreviewUrl = null;
  scannedMeds = [];
  scanState = "idle";
  renderScan();
}

async function runScan() {
  const apiKey = localStorage.getItem("medtrack_gemini") || "AIzaSyB8YSZo9ikOp8U4i6bncjE8rbEUpcDGf-Q";
  if (!apiKey || !scanImageBase64) return;
  scanState = "scanning";
  renderScan();

  const prompt = `Extract all medications from this prescription image. Return ONLY a JSON array, no explanation, no markdown.
Each item must have:
- name: string
- dosage: string (e.g. "500mg", empty string if not found)
- frequency: string (e.g. "twice daily after meals")
- duration: string (e.g. "14 days")
- times: array of clock time strings based on frequency (e.g. ["08:00","20:00"])
- instructions: string (special notes, empty string if none)
- weekly: boolean (true only if once a week)

Example: [{"name":"Paracetamol","dosage":"500mg","frequency":"twice daily","duration":"5 days","times":["08:00","20:00"],"instructions":"after food","weekly":false}]
If nothing found return: []`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: scanImageMime, data: scanImageBase64 } },
            { text: prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
    const cleaned = raw.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(cleaned);
    if (!Array.isArray(parsed) || parsed.length === 0) {
      scanState = "idle";
      showToast("No medications found. Try a clearer photo.");
      renderScan();
      return;
    }
    scannedMeds = parsed.map((m, i) => ({
      ...m,
      id: "scan_" + Date.now() + "_" + i,
      times: m.times?.length ? m.times : ["08:00"]
    }));
    scanState = "confirm";
    renderScan();
  } catch(e) {
    scanState = "idle";
    showToast("Error: " + e.message);
    renderScan();
  }
}

function renderConfirm() {
  let html = `<div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">
    Review and edit before adding to your schedule.
  </div>`;

  scannedMeds.forEach((med, i) => {
    html += `<div class="confirm-card">
      <div class="confirm-card-title">
        Medication ${i + 1}
        <button class="remove-btn" onclick="removeScannedMed(${i})">✕</button>
      </div>
      <div class="confirm-field">
        <label>Name</label>
        <input value="${med.name}" onchange="updateScannedMed(${i},'name',this.value)" />
      </div>
      <div class="confirm-field">
        <label>Dosage</label>
        <input value="${med.dosage}" onchange="updateScannedMed(${i},'dosage',this.value)" />
      </div>
      <div class="confirm-field">
        <label>Duration</label>
        <input value="${med.duration}" onchange="updateScannedMed(${i},'duration',this.value)" />
      </div>
      <div class="confirm-field">
        <label>Instructions</label>
        <input value="${med.instructions}" onchange="updateScannedMed(${i},'instructions',this.value)" />
      </div>
      <div class="confirm-field">
        <label>Times</label>
        <div class="times-row">${med.times.map(t => `<span class="time-chip">${t}</span>`).join("")}</div>
      </div>
    </div>`;
  });

  html += `
    <button class="primary-btn" onclick="confirmAndSave()">Add ${scannedMeds.length} Med${scannedMeds.length > 1 ? "s" : ""} to Schedule</button>
    <button class="secondary-btn" onclick="clearScan()">Cancel</button>
  `;

  document.getElementById("content").innerHTML = html;
}

function updateScannedMed(i, field, val) {
  scannedMeds[i][field] = val;
}

function removeScannedMed(i) {
  scannedMeds.splice(i, 1);
  if (scannedMeds.length === 0) { clearScan(); return; }
  renderConfirm();
}

function confirmAndSave() {
  const meds = loadMeds();
  scannedMeds.forEach(m => meds.push(m));
  saveMeds(meds);
  clearScan();
  scheduleNotifications();
  showToast("Meds added to your schedule");
  showPage("today");
}

// ── SETTINGS PAGE ─────────────────────────────────────────────────────────────

function renderSettings() {
  const meds = loadMeds();
  const notifPerm = "Notification" in window ? Notification.permission : "unsupported";

  document.getElementById("header").innerHTML = `
    <div class="date-label">Preferences</div>
    <div class="page-title">Settings</div>
  `;

  let html = `
    <div class="settings-section">
      <div class="settings-label">Gemini API Key</div>
      <input class="api-input" type="password" placeholder="Paste your Gemini API key..."
        value="${localStorage.getItem('medtrack_gemini') || ''}"
        onchange="localStorage.setItem('medtrack_gemini', this.value); showToast('API key saved');"
      />
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px">
        Free at aistudio.google.com → Get API Key
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-label">Notifications</div>
      <div class="settings-row">
        <div>
          <div class="settings-row-label">Daily reminders</div>
          <div class="settings-row-val">${notifPerm === "granted" ? "Permission granted" : "Permission required"}</div>
        </div>
        <button class="toggle ${notifEnabled && notifPerm === "granted" ? "on" : ""}" onclick="toggleNotif()"></button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-label">Medications (${meds.length})</div>`;

  meds.forEach(med => {
    html += `<div class="settings-row">
      <div style="flex:1;min-width:0">
        <div class="settings-row-label" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${med.name}</div>
        <div class="settings-row-val">${med.times.join(", ")} · ${med.duration}</div>
      </div>
    </div>`;
  });

  html += `</div>
    <div class="settings-section">
      <div class="settings-label">Data</div>
      <button class="action-btn" onclick="resetToday()">Reset today's log</button>
      <button class="action-btn danger" onclick="clearAll()">Clear all data</button>
    </div>

    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:16px">
      MedTrack v0.1 · Module 1 of 4
    </div>`;

  document.getElementById("content").innerHTML = html;
}

function toggleNotif() {
  if (!notifEnabled || Notification.permission !== "granted") {
    requestNotifications();
  } else {
    notifEnabled = false;
    localStorage.setItem("medtrack_notif", "false");
    clearTimers();
    showToast("Notifications disabled");
    renderPage();
  }
}

function resetToday() {
  const log = loadLog();
  delete log[getTodayKey()];
  saveLog(log);
  showToast("Today's log cleared");
  renderPage();
}

function clearAll() {
  if (confirm("Clear all medication data and history?")) {
    localStorage.removeItem("medtrack_log");
    localStorage.removeItem("medtrack_meds");
    localStorage.removeItem("medtrack_notif");
    notifEnabled = false;
    showToast("All data cleared");
    renderPage();
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// Auto-refresh every minute to update slot statuses
setInterval(() => { if (currentPage === "today") renderToday(); }, 60000);

scheduleNotifications();
renderPage();
</script>
</body>
</html>
